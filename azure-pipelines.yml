trigger:
  branches:
    include:
      - "*"

pr:
  branches:
    include:
      - main
      - release
      - release/*

variables:
  - group: employeecrud-cicd
  - name: buildConfiguration
    value: Release
  - name: dotnetSdkVersion
    value: 8.0.x
  - name: imageRepository
    value: employeecrud/web
  - name: imageTag
    value: $(Build.BuildId)
  - name: helmReleaseName
    value: employeecrud
  - name: helmChartPath
    value: deploy/helm/employeecrud
  - name: testNamespace
    value: employeecrud-test
  - name: prodNamespace
    value: employeecrud-prod

stages:
  - stage: Lint
    displayName: Lint
    jobs:
      - job: MegaLinter
        displayName: MegaLinter
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - script: docker pull oxsecurity/megalinter:v9
            displayName: Pull MegaLinter

          - bash: |
              set -euo pipefail
              docker run --rm \
                -v "$(System.DefaultWorkingDirectory):/tmp/lint" \
                --env-file <(env | grep -E "^(SYSTEM_|BUILD_|TF_|AGENT_)") \
                -e SYSTEM_ACCESSTOKEN="$(System.AccessToken)" \
                oxsecurity/megalinter:v9
            displayName: Run MegaLinter
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  - stage: BuildScanAndTest
    displayName: Build, scan, and test
    dependsOn: Lint
    jobs:
      - job: DotNet
        displayName: .NET quality gates
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - script: |
              set -euo pipefail
              dotnet restore src/EmployeeCrud.Web/EmployeeCrud.Web.csproj --configfile NuGet.config -warnaserror:NU1901,NU1902,NU1903,NU1904
              dotnet restore tests/EmployeeCrud.Tests/EmployeeCrud.Tests.csproj --configfile NuGet.config -warnaserror:NU1901,NU1902,NU1903,NU1904
            displayName: Restore with NuGet audit warnings as errors

          - script: |
              set -euo pipefail
              dotnet format src/EmployeeCrud.Application/EmployeeCrud.Application.csproj --no-restore --verify-no-changes --verbosity diagnostic
              dotnet format src/EmployeeCrud.Web/EmployeeCrud.Web.csproj --no-restore --verify-no-changes --verbosity diagnostic
              dotnet format tests/EmployeeCrud.Tests/EmployeeCrud.Tests.csproj --no-restore --verify-no-changes --verbosity diagnostic
            displayName: Verify formatting and coding style

          - script: |
              set -euo pipefail
              dotnet build src/EmployeeCrud.Web/EmployeeCrud.Web.csproj \
                --configuration $(buildConfiguration) \
                --no-restore \
                -warnaserror \
                /p:TreatWarningsAsErrors=true \
                /p:AnalysisMode=Recommended \
                /p:EnforceCodeStyleInBuild=true
              dotnet build tests/EmployeeCrud.Tests/EmployeeCrud.Tests.csproj \
                --configuration $(buildConfiguration) \
                --no-restore \
                -warnaserror \
                /p:TreatWarningsAsErrors=true \
                /p:AnalysisMode=Recommended \
                /p:EnforceCodeStyleInBuild=true
            displayName: Build with analyzers as errors

          - pwsh: |
              $ErrorActionPreference = 'Stop'
              $projects = @(
                'src/EmployeeCrud.Application/EmployeeCrud.Application.csproj',
                'src/EmployeeCrud.Web/EmployeeCrud.Web.csproj',
                'tests/EmployeeCrud.Tests/EmployeeCrud.Tests.csproj'
              )

              $vulnerablePackages = @()
              foreach ($project in $projects) {
                $json = dotnet list $project package --vulnerable --include-transitive --format json | Out-String
                $result = $json | ConvertFrom-Json
                foreach ($projectResult in @($result.projects)) {
                  foreach ($framework in @($projectResult.frameworks)) {
                    foreach ($package in @($framework.topLevelPackages + $framework.transitivePackages)) {
                      if ($package.vulnerabilities) {
                        $vulnerablePackages += [pscustomobject]@{
                          Project = $project
                          Package = $package.id
                          Version = $package.resolvedVersion
                        }
                      }
                    }
                  }
                }
              }

              if ($vulnerablePackages.Count -gt 0) {
                $vulnerablePackages | Format-Table -AutoSize | Out-String | Write-Host
                throw 'Vulnerable NuGet packages were found.'
              }
            displayName: Fail on vulnerable NuGet packages

          - script: |
              set -euo pipefail
              dotnet test tests/EmployeeCrud.Tests/EmployeeCrud.Tests.csproj \
                --configuration $(buildConfiguration) \
                --no-build \
                --logger trx \
                --results-directory "$(Agent.TempDirectory)/TestResults" \
                /p:CollectCoverage=true \
                /p:CoverletOutput="$(Build.SourcesDirectory)/TestResults/Coverage/" \
                /p:CoverletOutputFormat=cobertura \
                /p:Threshold=80 \
                /p:ThresholdType=line \
                /p:ThresholdStat=total
            displayName: Run unit tests with 80 percent coverage gate

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: "$(Agent.TempDirectory)/TestResults/*.trx"
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish code coverage
            inputs:
              summaryFileLocation: "$(Build.SourcesDirectory)/TestResults/Coverage/coverage.cobertura.xml"
              pathToSources: "$(Build.SourcesDirectory)"
              failIfCoverageEmpty: true

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: latest

          - script: |
              set -euo pipefail
              helm lint $(helmChartPath)
              helm template $(helmReleaseName) $(helmChartPath) --values $(helmChartPath)/values-test.yaml >/tmp/employeecrud-test.yaml
              helm template $(helmReleaseName) $(helmChartPath) --values $(helmChartPath)/values-prod.yaml >/tmp/employeecrud-prod.yaml
            displayName: Lint and render Helm chart

      - job: Database
        displayName: Build database DACPAC
        pool:
          vmImage: windows-latest
        steps:
          - checkout: self

          - task: VSBuild@1
            displayName: Build SQL database project
            inputs:
              solution: database/EmployeeCrud.Database/EmployeeCrud.Database.sqlproj
              configuration: $(buildConfiguration)
              platform: "Any CPU"
              msbuildArgs: '/p:SqlServerVerification=false'

          - task: PublishPipelineArtifact@1
            displayName: Publish database DACPAC artifact
            inputs:
              targetPath: database/EmployeeCrud.Database/bin/$(buildConfiguration)/EmployeeCrud.Database.dacpac
              artifact: database
              publishLocation: pipeline

  - stage: Container
    displayName: Container scan and publish
    dependsOn: BuildScanAndTest
    jobs:
      - job: Image
        displayName: Build and scan image
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              docker run --rm \
                -v "$(Build.SourcesDirectory):/src" \
                aquasec/trivy:latest fs \
                --exit-code 1 \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --skip-dirs /src/.dotnet \
                --skip-dirs /src/TestResults \
                --skip-dirs /src/src/EmployeeCrud.Application/bin \
                --skip-dirs /src/src/EmployeeCrud.Application/obj \
                --skip-dirs /src/src/EmployeeCrud.Web/bin \
                --skip-dirs /src/src/EmployeeCrud.Web/obj \
                --skip-dirs /src/tests/EmployeeCrud.Tests/bin \
                --skip-dirs /src/tests/EmployeeCrud.Tests/obj \
                --skip-dirs /src/database/EmployeeCrud.Database/bin \
                --skip-dirs /src/database/EmployeeCrud.Database/obj \
                /src
            displayName: Scan repository dependencies and IaC with Trivy

          - script: |
              set -euo pipefail
              docker build \
                --file Dockerfile \
                --tag $(imageRepository):$(imageTag) \
                .
            displayName: Build Docker image

          - script: |
              set -euo pipefail
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                aquasec/trivy:latest image \
                --exit-code 1 \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                $(imageRepository):$(imageTag)
            displayName: Scan Docker image with Trivy

          - task: Docker@2
            displayName: Login to Azure Container Registry
            condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/release'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')))
            inputs:
              command: login
              containerRegistry: $(acrServiceConnection)

          - script: |
              set -euo pipefail
              docker tag $(imageRepository):$(imageTag) $(acrLoginServer)/$(imageRepository):$(imageTag)
              docker push $(acrLoginServer)/$(imageRepository):$(imageTag)
            displayName: Push image to ACR
            condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/release'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')))

          - task: PublishPipelineArtifact@1
            displayName: Publish Helm chart artifact
            inputs:
              targetPath: $(helmChartPath)
              artifact: helm-chart
              publishLocation: pipeline

  - stage: DeployTest
    displayName: Deploy to test AKS
    dependsOn: Container
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Test
        displayName: Test deployment
        pool:
          vmImage: ubuntu-latest
        environment: employeecrud-test
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: database

                - task: AzureCLI@2
                  displayName: Publish test database schema
                  condition: and(succeeded(), eq(variables['deployDatabase'], 'true'))
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      mkdir -p "$(Agent.TempDirectory)/sqlpackage"
                      curl -sSL https://aka.ms/sqlpackage-linux -o "$(Agent.TempDirectory)/sqlpackage/sqlpackage.zip"
                      unzip -q "$(Agent.TempDirectory)/sqlpackage/sqlpackage.zip" -d "$(Agent.TempDirectory)/sqlpackage"
                      chmod +x "$(Agent.TempDirectory)/sqlpackage/sqlpackage"
                      "$(Agent.TempDirectory)/sqlpackage/sqlpackage" \
                        /Action:Publish \
                        /SourceFile:"$(Pipeline.Workspace)/database/EmployeeCrud.Database.dacpac" \
                        /TargetConnectionString:"${TEST_SQL_CONNECTION_STRING}" \
                        /p:BlockOnPossibleDataLoss=true
                  env:
                    TEST_SQL_CONNECTION_STRING: $(testSqlConnectionString)

                - task: HelmInstaller@1
                  displayName: Install Helm
                  inputs:
                    helmVersionToInstall: latest

                - task: AzureCLI@2
                  displayName: Helm upgrade test
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az aks get-credentials --resource-group "$(aksTestResourceGroup)" --name "$(aksTestClusterName)" --overwrite-existing
                      kubectl create namespace "$(testNamespace)" --dry-run=client -o yaml | kubectl apply -f -
                      if [ -n "${TEST_SQL_CONNECTION_STRING:-}" ]; then
                        kubectl create secret generic employeecrud-db \
                          --namespace "$(testNamespace)" \
                          --from-literal=connectionString="${TEST_SQL_CONNECTION_STRING}" \
                          --dry-run=client -o yaml | kubectl apply -f -
                      fi
                      helm upgrade --install "$(helmReleaseName)" "$(helmChartPath)" \
                        --namespace "$(testNamespace)" \
                        --create-namespace \
                        --values "$(helmChartPath)/values-test.yaml" \
                        --set image.repository="$(acrLoginServer)/$(imageRepository)" \
                        --set image.tag="$(imageTag)" \
                        --atomic \
                        --timeout 5m
                      kubectl rollout status deployment/$(helmReleaseName) --namespace "$(testNamespace)" --timeout=180s
                  env:
                    TEST_SQL_CONNECTION_STRING: $(testSqlConnectionString)

  - stage: DeployProduction
    displayName: Deploy to production AKS
    dependsOn: Container
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/release'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')))
    jobs:
      - deployment: Production
        displayName: Production deployment
        pool:
          vmImage: ubuntu-latest
        environment: employeecrud-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: database

                - task: AzureCLI@2
                  displayName: Publish production database schema
                  condition: and(succeeded(), eq(variables['deployDatabase'], 'true'))
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      mkdir -p "$(Agent.TempDirectory)/sqlpackage"
                      curl -sSL https://aka.ms/sqlpackage-linux -o "$(Agent.TempDirectory)/sqlpackage/sqlpackage.zip"
                      unzip -q "$(Agent.TempDirectory)/sqlpackage/sqlpackage.zip" -d "$(Agent.TempDirectory)/sqlpackage"
                      chmod +x "$(Agent.TempDirectory)/sqlpackage/sqlpackage"
                      "$(Agent.TempDirectory)/sqlpackage/sqlpackage" \
                        /Action:Publish \
                        /SourceFile:"$(Pipeline.Workspace)/database/EmployeeCrud.Database.dacpac" \
                        /TargetConnectionString:"${PROD_SQL_CONNECTION_STRING}" \
                        /p:BlockOnPossibleDataLoss=true
                  env:
                    PROD_SQL_CONNECTION_STRING: $(prodSqlConnectionString)

                - task: HelmInstaller@1
                  displayName: Install Helm
                  inputs:
                    helmVersionToInstall: latest

                - task: AzureCLI@2
                  displayName: Helm upgrade production
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az aks get-credentials --resource-group "$(aksProdResourceGroup)" --name "$(aksProdClusterName)" --overwrite-existing
                      kubectl create namespace "$(prodNamespace)" --dry-run=client -o yaml | kubectl apply -f -
                      if [ -n "${PROD_SQL_CONNECTION_STRING:-}" ]; then
                        kubectl create secret generic employeecrud-db \
                          --namespace "$(prodNamespace)" \
                          --from-literal=connectionString="${PROD_SQL_CONNECTION_STRING}" \
                          --dry-run=client -o yaml | kubectl apply -f -
                      fi
                      helm upgrade --install "$(helmReleaseName)" "$(helmChartPath)" \
                        --namespace "$(prodNamespace)" \
                        --create-namespace \
                        --values "$(helmChartPath)/values-prod.yaml" \
                        --set image.repository="$(acrLoginServer)/$(imageRepository)" \
                        --set image.tag="$(imageTag)" \
                        --atomic \
                        --timeout 5m
                      kubectl rollout status deployment/$(helmReleaseName) --namespace "$(prodNamespace)" --timeout=180s
                  env:
                    PROD_SQL_CONNECTION_STRING: $(prodSqlConnectionString)
